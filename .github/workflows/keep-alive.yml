name: JurisQuery Keep-Alive

on:
  schedule:
    # Run every 5 minutes (Render sleep timeout is 15 mins)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping JurisQuery Backend
        run: |
          # Replace with your actual Render URL if different
          URL="https://jurisquery-backend.onrender.com/health"
          echo "Pinging $URL..."
          curl -s --fail $URL > /dev/null || echo "Ping failed but continuing..."
